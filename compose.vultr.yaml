services:
  caddy:
    image: caddy:2-alpine
    environment:
      CRASHDIAG_SANDBOX_DOMAIN: "${CRASHDIAG_SANDBOX_DOMAIN:?Set the public sandbox DNS name}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/vultr/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      sandbox:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
